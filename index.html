<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraLatro: Entity Edition</title>
    
    <!-- Bibliotecas e Estilos Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Three.js Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Post-processing Overlay -->
    <div class="scanlines"></div>
    <div id="impact-flash"></div>
    <div id="vignette-overlay"></div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <!-- Top Bandeja de Jokers/Economia -->
        <div class="absolute top-0 w-full p-2 pointer-events-none z-10">
            <div class="flex justify-between items-center max-w-5xl mx-auto">
                <div id="relics-tray" class="flex gap-2">
                    <!-- Jokers gerados aqui -->
                </div>
                <div class="text-right">
                    <span class="text-gray-400 font-bold text-sm">ALMAS</span>
                    <span id="souls-counter" class="text-2xl text-yellow-400 drop-shadow-[0_0_5px_#facc15] ml-2">0</span>
                </div>
            </div>
        </div>

        <!-- Top HUD Partida -->
        <div id="combat-hud" class="flex flex-col h-full justify-between transition-opacity duration-500 pointer-events-none">
            
            <div class="flex flex-col sm:flex-row justify-between items-center sm:items-start w-full max-w-5xl mx-auto mt-12 px-4 gap-4">
            
            <div class="hud-box p-4 w-full sm:min-w-[200px] sm:w-auto text-center sm:text-left">
                <div class="text-gray-500 text-xs mb-1 font-bold">O CONTRATO EXIGE</div>
                <div class="text-2xl sm:text-3xl font-bold text-red-600 drop-shadow-[0_0_8px_rgba(220,38,38,0.8)]"
                    id="target-score">10.000</div>
                <div class="w-full bg-gray-900 h-2 mt-2 rounded overflow-hidden border border-gray-700">
                    <div id="score-bar"
                        class="bg-red-600 h-full w-0 transition-all duration-500 shadow-[0_0_10px_rgba(255,0,0,0.8)]">
                    </div>
                </div>
            </div>

            <div class="hud-box p-4 w-full sm:min-w-[200px] sm:w-auto text-center sm:text-right">
                <div class="text-gray-500 text-xs mb-1 font-bold">SUA ALMA RENDEU</div>
                <div class="text-3xl sm:text-4xl font-bold text-blue-400 drop-shadow-[0_0_8px_rgba(96,165,250,0.8)]"
                    id="current-score">0</div>
            </div>
            
        </div>

        <!-- Dealer Dialogue -->
        <div id="dealer-dialogue">
            "Aposte sua vida."
        </div>

        <!-- Center Action Area (Score Popups) -->
        <div id="center-display"
            class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center pointer-events-none">
            <div id="hand-name" class="text-2xl sm:text-3xl font-bold text-yellow-300 opacity-0 drop-shadow-[0_0_5px_#000] mb-2 text-center break-words">
            </div>
            <div id="score-popup"
                class="text-4xl sm:text-6xl font-bold text-white opacity-0 drop-shadow-[0_0_15px_rgba(255,255,255,1)] flex items-center">
                <span class="text-blue-400" id="popup-chips">0</span> <span class="text-red-600 text-2xl sm:text-4xl mx-2">X</span>
                <span class="text-red-500" id="popup-mult">0</span>
            </div>
        </div>

        <!-- Bottom Controls -->
        <div class="flex flex-col md:flex-row justify-between items-center md:items-end w-full max-w-5xl mx-auto mb-8 md:mb-2 px-2 gap-4">

            <!-- Hands/Discards Wrapper -->
            <div class="flex gap-2 w-full md:w-auto justify-center">
                <div class="hud-box p-3 text-center border-blue-900">
                    <div class="text-gray-500 text-xs">MÃOS</div>
                    <div class="text-2xl font-bold text-blue-400" id="hands-left">4</div>
                </div>
                <div class="hud-box p-3 text-center border-red-900">
                    <div class="text-gray-500 text-xs">DESCARTES</div>
                    <div class="text-2xl font-bold text-red-500" id="discards-left">3</div>
                </div>
            </div>

            <!-- Current Hand Potential -->
            <div class="hud-box py-2 px-4 sm:px-6 flex items-center justify-between gap-4 bg-black bg-opacity-80 border-gray-600 w-full sm:w-auto">
                <div class="text-center min-w-[100px] sm:min-w-[120px]">
                    <div class="text-[10px] text-gray-500">PREVISTA</div>
                    <div id="current-hand-type" class="text-sm sm:text-lg font-bold text-yellow-300 whitespace-nowrap overflow-hidden text-ellipsis">Nenhuma</div>
                </div>
                <div class="h-8 w-px bg-gray-700"></div>
                <div class="flex items-center gap-2 sm:gap-3 text-lg sm:text-2xl font-bold">
                    <span class="bg-blue-900 text-blue-200 px-2 sm:px-3 py-1 rounded border border-blue-500 shadow-[0_0_10px_rgba(0,0,255,0.3)]" id="base-chips">0</span>
                    <span class="text-red-600 text-xs sm:text-sm">X</span>
                    <span class="bg-red-900 text-red-200 px-2 sm:px-3 py-1 rounded border border-red-500 shadow-[0_0_10px_rgba(255,0,0,0.3)]" id="base-mult">0</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-2 w-full md:w-auto">
                <button id="btn-play"
                    class="pointer-events-auto flex-1 md:flex-none bg-blue-800 hover:bg-blue-600 text-blue-100 py-3 sm:py-4 px-4 sm:px-8 rounded text-sm sm:text-xl border-2 border-blue-400 disabled:opacity-50 btn"
                    disabled>
                    JOGAR MÃO
                </button>
                <button id="btn-discard"
                    class="pointer-events-auto bg-red-900 hover:bg-red-700 text-red-100 py-4 px-8 rounded text-xl border-2 border-red-500 btn"
                    disabled>
                    DESCARTAR
                </button>
            </div>

        </div>
        </div>

        <!-- THE PURGATORY (STORE) -->
        <div id="shop-overlay" class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center opacity-0 transition-opacity duration-1000 hidden overflow-y-auto px-4 py-8">
            <div class="text-center mb-8 shrink-0">
                <h1 class="text-4xl md:text-6xl text-red-600 font-bold drop-shadow-[0_0_10px_#f00] glitch-text leading-tight">O PURGATÓRIO</h1>
                <p class="text-gray-400 mt-2 text-sm md:text-base">Gaste suas almas enquanto ainda existem.</p>
            </div>
            
            <!-- Cards Wrapper (Scrolls on small screens) -->
            <div id="shop-slots" class="flex flex-col md:flex-row gap-4 md:gap-6 pointer-events-auto justify-center items-center shrink-0">
                <!-- Shopping Items injetados dinamicamente via JS -->
            </div>

            <button id="btn-next-blind" class="mt-8 md:mt-12 pointer-events-auto hover:bg-red-700 hover:text-white bg-transparent text-gray-400 py-3 px-8 md:px-12 border border-gray-600 rounded btn shrink-0">
                PROSSEGUIR (BLIND X)
            </button>
        </div>
    </div>

    <!-- Módulo Principal ES6 -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
